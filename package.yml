package: cloud.lazycat.app.qiaomu-appreview
version: 0.1.1
name: 乔木 App 评论洞察
description: >-
  自托管 App Store 评论抓取与 AI 洞察分析，支持情感趋势、主题聚类与版本诊断。
  支持将 Markdown 分析报告保存至懒猫网盘。安装时需填写 LLM API Key。
author: zhistor26
license: MIT

import_resources:
  - kind: skills

locales:
  zh-CN:
    name: 乔木 App 评论洞察
    description: >-
      自托管 App Store 评论抓取与 AI 洞察分析。支持导出分析报告至懒猫网盘。
      安装时填写 LLM API Key。
    usage: >-
      安装时必填 LLM API Key（DeepSeek 或兼容 OpenAI 端点）。
      分析完成后可点击「保存至懒猫网盘」归档 Markdown 报告。
      数据持久化于 /lzcapp/var/data；定时任务每日 08:00 抓取、20:00 分析（UTC）。
  en-US:
    name: Qiaomu App Review Insights
    description: >-
      Self-hosted App Store review fetch and AI insights. Export Markdown reports to LazyCat disk.
      LLM API Key required at install.
    usage: >-
      LLM API Key required at install (DeepSeek or OpenAI-compatible endpoint).
      Save Markdown analysis reports to LazyCat cloud disk after review.
      Data persists under /lzcapp/var/data; cron fetch 08:00 UTC, analyze 20:00 UTC.
