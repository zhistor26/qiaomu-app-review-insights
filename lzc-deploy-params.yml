params:
  - id: qiaomu_llm_api_key
    type: secret
    name: LLM API Key
    description: DeepSeek 或兼容 OpenAI 的 API Key，用于评论 AI 分析（必填）
    optional: false

  - id: qiaomu_llm_base_url
    type: string
    name: LLM Base URL
    description: API 端点地址
    default_value: "https://api.deepseek.com/v1"
    optional: true

  - id: qiaomu_llm_model
    type: string
    name: LLM Model
    description: 模型名称
    default_value: "deepseek-v4-flash"
    optional: true

locales:
  zh-CN:
    qiaomu_llm_api_key:
      name: LLM API Key
      description: DeepSeek 或兼容 OpenAI 的 API Key，用于评论 AI 分析
    qiaomu_llm_base_url:
      name: LLM API 地址
      description: 默认 https://api.deepseek.com/v1
    qiaomu_llm_model:
      name: LLM 模型
      description: 默认 deepseek-v4-flash
  en-US:
    qiaomu_llm_api_key:
      name: LLM API Key
      description: DeepSeek or OpenAI-compatible API key for review analysis
    qiaomu_llm_base_url:
      name: LLM Base URL
      description: Default https://api.deepseek.com/v1
    qiaomu_llm_model:
      name: LLM Model
      description: Default deepseek-v4-flash
